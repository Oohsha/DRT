<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRT</title>
    <link rel="stylesheet" href="./css/inquiry.css">
    <link rel="shortcut icon" href="./images/DRT-logo.png" type="image/x-icon">
</head>

<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="logo">DRT</div>
        <nav>
            <ul>
                <li><a href="./main.html">홈</a></li>
                <li><a href="#">서비스</a></li>
                <li><a href="./intro.html">소개</a></li>
                <li><a href="./inquiry.html">문의</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-hero">
        <div class="hero-content">
            <h1 class="hero-title">문의하기</h1>
            <p class="hero-subtitle">궁금한 사항이 있으시면 언제든지 연락주세요. 최대한 빠르게 답변드리겠습니다.</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="contact-grid">
            <div class="contact-info">
                <h3>연락처 정보</h3>
                <p>저희와 함께하고 싶으시거나 궁금한 점이 있으시면 아래 연락처로 문의해주세요. 전문 상담원이 친절하게 도움을 드리겠습니다.</p>

                <div class="contact-details">
                    <div class="contact-item">
                        <div class="contact-icon">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                        </div>
                        <div class="contact-text">
                            <h4>이메일</h4>
                            <p>sdh250415@sdh.hs.kr</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                            </svg>
                        </div>
                        <div class="contact-text">
                            <h4>전화번호</h4>
                            <p>010-9678-0371</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                        </div>
                        <div class="contact-text">
                            <h4>주소</h4>
                            <p>서울특별시 중랑구 중랑천로 218<br>백운아트빌 3층</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12,6 12,12 16,14" />
                            </svg>
                        </div>
                        <div class="contact-text">
                            <h4>운영시간</h4>
                            <p>월-금: 09:00 - 18:00<br>토,일: 휴무</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contact-form-container">
                <h3 class="form-title">메시지 보내기</h3>

                <div class="alert alert-success" id="successAlert"></div>
                <div class="alert alert-error" id="errorAlert"></div>

                <form class="contact-form" onsubmit="handleSubmit(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">이름 *</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="이름을 입력해주세요"
                                required>
                            <div class="error-message" id="nameError"></div>
                        </div>
                        <div class="form-group">
                            <label for="email">이메일 *</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="이메일을 입력해주세요"
                                required>
                            <div class="error-message" id="emailError"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="subject">제목 *</label>
                        <input type="text" id="subject" name="subject" class="form-control" placeholder="문의 제목을 입력해주세요"
                            required>
                        <div class="error-message" id="subjectError"></div>
                    </div>

                    <div class="form-group">
                        <label for="message">메시지 *</label>
                        <textarea id="message" name="message" class="form-control textarea"
                            placeholder="문의 내용을 자세히 적어주세요" required></textarea>
                        <div class="error-message" id="messageError"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">메시지 전송</button>
                </form>
            </div>
        </div>
    </section>

    <section class="map-section">
        <h2 class="map-title">찾아오시는 길</h2>
        <div class="map-container">
            <div class="map-placeholder">
                지도
            </div>
        </div>
    </section>

<script src="./script/inquiry.js"></script>
</body>

</html>
